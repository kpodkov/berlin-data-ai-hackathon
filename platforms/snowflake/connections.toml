# Snowflake CLI connection config
# Copy to ~/.snowflake/connections.toml and fill in your details
#
# Usage: snow sql -q "SELECT 1" -c hackathon

[hackathon]
account = "<YOUR_ACCOUNT>"
user = "<YOUR_EMAIL>"
password = "<YOUR_PASSWORD>"
warehouse = "WH_TEAM_3_XS"
database = "DB_JW_SHARED"
schema = "CHALLENGE"
