version: 2

models:
  - name: stg_worldbank_metadata
    description: >
      Bronze layer for World Bank indicator catalogue.
      One row per series_id ({INDICATOR_CODE}_{ISO3_COUNTRY_CODE}).
      Faithful copy of DB_TEAM_3.RAW.WORLDBANK_METADATA with two derived columns added:
      indicator_code (the WB indicator prefix) and country_iso3 (the 3-letter country code).
      150 series: 10 socioeconomic indicators × 15 countries. All annual frequency, 2000–2024.
      Countries: AUS, BRA, CAN, CHN, DEU, FRA, GBR, IND, ITA, JPN, KOR, MEX, NGA, USA, ZAF.
      Indicators: GDP per capita PPP, PPP conversion factor, remittances, inflation (CPI),
      real interest rate, gross savings, income share top 10%, Gini index, unemployment, life expectancy.
      Join to stg_worldbank_indicators on series_id to enrich observations with descriptions.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        source: World Bank Open Data API
        layer: staging
    columns:
      - name: series_id
        description: >
          Compound identifier: "{WB_INDICATOR_CODE}_{ISO3_COUNTRY_CODE}" (e.g. NY.GDP.PCAP.PP.CD_USA).
          Primary key. Matches series_id in stg_worldbank_indicators.
        data_tests:
          - not_null
          - unique
      - name: indicator_code
        description: >
          Derived: the World Bank indicator code extracted from series_id (before the last underscore).
          Known values: NY.GDP.PCAP.PP.CD, PA.NUS.PPP, BX.TRF.PWKR.CD.DT, FP.CPI.TOTL.ZG,
          FR.INR.RINR, NY.GNS.ICTR.ZS, SI.DST.10TH.10, SI.POV.GINI, SL.UEM.TOTL.ZS, SP.DYN.LE00.IN.
        data_tests:
          - not_null
      - name: country_iso3
        description: >
          Derived: 3-letter ISO country code extracted from the last 3 characters of series_id.
          Known values: AUS, BRA, CAN, CHN, DEU, FRA, GBR, IND, ITA, JPN, KOR, MEX, NGA, USA, ZAF.
        data_tests:
          - not_null
      - name: title
        description: Human-readable indicator + country name (e.g. "GDP per Capita PPP (current USD) - USA").
      - name: units
        description: >
          Units of the value column in stg_worldbank_indicators for this series.
          NULL when dimensionless (e.g. Gini Index, PPP conversion factor).
      - name: frequency
        description: Data frequency. All World Bank indicators are Annual.
      - name: source
        description: Data provider. Always "World Bank".
      - name: _source
        description: Always 'world_bank'.
      - name: _loaded_at
        description: Timestamp when this dbt model was last run (UTC).

  - name: stg_worldbank_indicators
    description: >
      Bronze layer for World Bank annual socioeconomic indicators.
      One row per (series_id, obs_date). Faithful copy of DB_TEAM_3.RAW.WORLDBANK_INDICATORS
      with two derived columns added (indicator_code, country_iso3, reference_year) and audit columns.
      150 series × 25 annual observations = ~3,750 rows. All obs_dates are January 1st of the reference year.
      Covers 15 countries and 10 indicators spanning 2000–2024.
      Use stg_worldbank_metadata to join descriptions and units.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        source: World Bank Open Data API
        layer: staging
    columns:
      - name: series_id
        description: >
          Compound identifier: "{WB_INDICATOR_CODE}_{ISO3_COUNTRY_CODE}".
          Composite primary key with obs_date.
          Matches series_id in stg_worldbank_metadata for descriptive joins.
        data_tests:
          - not_null
      - name: obs_date
        description: >
          Reference date. Always January 1st of the reference year (e.g. 2020-01-01 = year 2020).
          Use reference_year column for integer year comparisons.
          Composite primary key with series_id.
        data_tests:
          - not_null
      - name: indicator_code
        description: >
          Derived: World Bank indicator code extracted from series_id (before the last underscore).
          Enables filtering or pivoting by indicator without a join to stg_worldbank_metadata.
        data_tests:
          - not_null
      - name: country_iso3
        description: >
          Derived: 3-letter ISO country code extracted from the last 3 chars of series_id.
          Enables filtering or pivoting by country without a join to stg_worldbank_metadata.
        data_tests:
          - not_null
      - name: reference_year
        description: >
          Derived: integer calendar year from obs_date (e.g. 2024 for 2024-01-01).
          Convenience column for year-based filtering and time-series analysis.
      - name: value
        description: >
          Annual observed value (NUMBER(38,8)). Units vary by indicator — see stg_worldbank_metadata.
          NULL indicates data not available for this country-year combination.
      - name: _source
        description: Always 'world_bank'.
      - name: _loaded_at
        description: Timestamp when this dbt model was last run (UTC).
