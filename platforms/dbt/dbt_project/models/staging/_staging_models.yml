version: 2

models:
  - name: stg_fred_observations
    description: "FRED time series observations. One row per (series_id, obs_date)."
    columns:
      - name: series_id
        data_tests: [not_null]
      - name: obs_date
        data_tests: [not_null]
      - name: value

  - name: stg_fred_series_metadata
    description: "FRED series catalogue. One row per series_id."
    columns:
      - name: series_id
        data_tests: [unique, not_null]

  - name: stg_fred_timeseries
    description: "Pure source mirror of FRED_OBSERVATIONS. One row per (series_id, obs_date). Business logic (topic classification, metadata join) lives in int_fred_topic_classified."
    columns:
      - name: series_id
        data_tests: [not_null]
      - name: obs_date
        data_tests: [not_null]
      - name: value

  - name: stg_market_returns
    description: "Pure source mirror of MARKET_PRICES. One row per (series_id, obs_date). Business logic (asset_class, daily_return, metadata join) lives in int_market_daily_returns."
    columns:
      - name: series_id
        data_tests: [not_null]
      - name: obs_date
        data_tests: [not_null]
      - name: value

  - name: stg_worldbank_countries
    description: "Pure source mirror of WORLDBANK_INDICATORS. One row per (series_id, obs_date). Business logic (label lookups, metadata join) lives in int_worldbank_enriched."
    columns:
      - name: series_id
        data_tests: [not_null]
      - name: obs_date
        data_tests: [not_null]
      - name: value
