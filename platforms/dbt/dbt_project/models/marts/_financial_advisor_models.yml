version: 2

models:
  - name: mart_market_environment
    description: >
      Unified macro environment snapshot. Grain: one row per indicator (~9 rows).
      Answers "Where are we in the economic cycle?" with traffic-light signals and an overall verdict.
      Each row carries the full verdict context (overall_environment, traffic light counts)
      via a cross-join — this makes every row self-contained for Lightdash tile filtering.
      DISCLAIMER: Illustrative only — uses finalized historical data. Not investment advice.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: gold
        metrics:
          count_red_signals:
            type: count
            sql: "CASE WHEN ${TABLE}.signal_color = 'red' THEN 1 END"
            label: "Red Signals"
            description: "Number of macro indicators currently in red (unfavorable)."
          count_green_signals:
            type: count
            sql: "CASE WHEN ${TABLE}.signal_color = 'green' THEN 1 END"
            label: "Green Signals"
            description: "Number of macro indicators currently in green (favorable)."
          count_yellow_signals:
            type: count
            sql: "CASE WHEN ${TABLE}.signal_color = 'yellow' THEN 1 END"
            label: "Yellow Signals"
            description: "Number of macro indicators currently in yellow (neutral)."
          avg_z_score:
            type: average
            sql: "${TABLE}.z_score"
            label: "Avg Z-Score"
            description: "Average z-score across all macro indicators."
    columns:
      - name: series_id
        description: FRED series identifier. Primary key.
        data_tests:
          - not_null
          - unique
      - name: indicator_name
        description: Human-readable indicator name (e.g. 'Real Gross Domestic Product').
        data_tests:
          - not_null
      - name: category
        description: >
          Dashboard grouping derived from series_id:
          Growth, Inflation, Labor Market, Interest Rates, Consumer Health, Market Sentiment.
        data_tests:
          - not_null
          - accepted_values:
              values: ['Growth', 'Inflation', 'Labor Market', 'Interest Rates', 'Consumer Health', 'Market Sentiment', 'Other']
      - name: units
        description: Units of latest_value (varies by series).
      - name: as_of_period
        description: YYYY-MM period of the latest observation.
        data_tests:
          - not_null
      - name: latest_value
        description: Most recent monthly value, rounded to 2 decimal places.
      - name: yoy_change_pct
        description: Year-over-year percentage change.
      - name: z_score
        description: Standardized score vs. trailing 36-month window. Null during warm-up period.
      - name: regime_label
        description: Regime classification based on z-score (Elevated, Normal, Depressed).
        data_tests:
          - accepted_values:
              values: ['Elevated', 'Normal', 'Depressed', 'Insufficient data']
      - name: signal_color
        description: Traffic-light color for this indicator (green/yellow/red).
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
        meta:
          dimension:
            type: string
      - name: overall_environment
        description: >
          Majority-vote verdict across all indicators:
          'Favorable' (>=60% green), 'Caution Advised' (>=40% red), 'Mixed Signals' otherwise.
        data_tests:
          - not_null
          - accepted_values:
              values: ['Favorable', 'Caution Advised', 'Mixed Signals']
      - name: overall_traffic_light
        description: Traffic-light color for the overall environment verdict.
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
      - name: green_count
        description: Number of green indicators in this snapshot.
      - name: yellow_count
        description: Number of yellow indicators in this snapshot.
      - name: red_count
        description: Number of red indicators in this snapshot.
      - name: disclaimer
        description: Always 'Illustrative only — uses finalized historical data. Not investment advice.'
      - name: _loaded_at
        description: Timestamp when this model was last built (UTC).

  - name: mart_risk_monitor
    description: >
      Traffic-light risk monitor with composite risk score.
      Grain: one row per risk indicator (~4 rows), each carrying the overall composite score.
      Answers "Should I be worried right now?" with per-indicator detail and an overall verdict.
      Overall risk score = AVG of signal scores (red=100, yellow=50, green=0).
      DISCLAIMER: Illustrative only — uses finalized historical data. Not investment advice.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: gold
        metrics:
          composite_risk_score:
            type: max
            sql: "${TABLE}.overall_risk_score"
            label: "Overall Risk Score"
            description: "Composite risk score 0–100. Red=100, Yellow=50, Green=0 per indicator, averaged."
          count_red_risks:
            type: count
            sql: "CASE WHEN ${TABLE}.traffic_light = 'red' THEN 1 END"
            label: "Red Risk Signals"
            description: "Number of risk indicators currently in red."
    columns:
      - name: risk_indicator
        description: Name of the risk indicator. Primary key.
        data_tests:
          - not_null
          - unique
      - name: category
        description: Category grouping (Interest Rates, Financial Markets, Consumer Prices, Labour Market).
        data_tests:
          - not_null
      - name: risk_value
        description: Numeric signal value. Interpretation depends on indicator — see units column.
      - name: units
        description: Units of risk_value (e.g. 'percentage points', 'index points').
        data_tests:
          - not_null
      - name: traffic_light
        description: Per-indicator traffic-light signal.
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
        meta:
          dimension:
            type: string
      - name: action_text
        description: Plain-English interpretation and recommended action for this indicator.
        data_tests:
          - not_null
      - name: urgency_rank
        description: Sort order — red=1, yellow=2, green=3.
      - name: signal_score
        description: Numeric score for this indicator — red=100, yellow=50, green=0.
      - name: overall_risk_score
        description: >
          Composite risk score 0–100 = AVG(signal_score) across all indicators.
          <30 = Low Risk, 30–59 = Moderate Risk, >=60 = High Risk.
        data_tests:
          - not_null
        meta:
          dimension:
            hidden: true
      - name: overall_risk_label
        description: Human-readable label for the composite risk score.
        data_tests:
          - not_null
          - accepted_values:
              values: ['Low Risk', 'Moderate Risk', 'High Risk']
      - name: overall_traffic_light
        description: Traffic-light color corresponding to overall_risk_label.
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
      - name: disclaimer
        description: Always 'Illustrative only — uses finalized historical data. Not investment advice.'
      - name: _loaded_at
        description: Timestamp when this model was last built (UTC).

  - name: mart_personalized_advisor
    description: >
      Per-user personalized financial advisor output. Grain: one row per (user_id, macro_series_id).
      Each user sees 3 macro signals relevant to their wealth tier, with a personalized_action recommendation.
      Combines int_user_wealth_proxy (behavioral wealth proxy) with mart_market_environment (macro regime).
      macro_focus drives which 3 FRED series are retained per user:
        'Market Performance & Rates' -> SP500, DGS10, FEDFUNDS
        'Inflation & Employment'     -> CPIAUCSL, UNRATE, GDPC1
        'Inflation & Savings'        -> CPIAUCSL, PSAVERT, UNRATE
      DISCLAIMER: Illustrative only — uses finalized historical data. Not investment advice.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: marts
        metrics:
          count_users:
            type: count_distinct
            sql: "${TABLE}.user_id"
            label: "Users"
            description: "Number of distinct users in the advisor"
          count_premium_users:
            type: count_distinct
            sql: "CASE WHEN ${TABLE}.wealth_tier = 'Premium' THEN ${TABLE}.user_id END"
            label: "Premium Users"
            description: "Users in the Premium wealth tier (highest financial score)"
          count_budget_users:
            type: count_distinct
            sql: "CASE WHEN ${TABLE}.wealth_tier = 'Budget' THEN ${TABLE}.user_id END"
            label: "Budget Users"
            description: "Users in the Budget wealth tier (lowest financial score)"
          avg_financial_score:
            type: average
            sql: "${TABLE}.financial_score"
            label: "Avg Financial Score"
            description: "Average financial score across all users"
          count_red_macro_signals:
            type: count
            sql: "CASE WHEN ${TABLE}.macro_signal_color = 'red' THEN 1 END"
            label: "Red Macro Signals"
            description: "Number of red (unfavorable) macro signals in the advisor view"
          count_green_macro_signals:
            type: count
            sql: "CASE WHEN ${TABLE}.macro_signal_color = 'green' THEN 1 END"
            label: "Green Macro Signals"
            description: "Number of green (favorable) macro signals in the advisor view"
    columns:
      - name: user_id
        description: Anonymous JustWatch user identifier.
        data_tests:
          - not_null
        meta:
          dimension:
            type: string
            label: "User ID"
      - name: segment
        description: User segment label from the financial profiling model.
      - name: wealth_tier
        description: Premium / Affluent / Middle / Budget — derived from financial_score.
        data_tests:
          - not_null
          - accepted_values:
              values: ['Premium', 'Affluent', 'Middle', 'Budget']
        meta:
          dimension:
            type: string
            label: "Wealth Tier"
      - name: spending_willingness
        description: High Spender / Moderate Spender / Low Spender / Free Only — derived from tvod_propensity and is_free_only.
        meta:
          dimension:
            type: string
            label: "Spending Willingness"
      - name: macro_focus
        description: Which macro domain is most relevant for this user's wealth tier.
        data_tests:
          - not_null
          - accepted_values:
              values: ['Market Performance & Rates', 'Inflation & Employment', 'Inflation & Savings']
        meta:
          dimension:
            type: string
            label: "Macro Focus"
      - name: financial_score
        description: Composite financial score (0–100) driving wealth_tier and macro_focus.
      - name: macro_series_id
        description: FRED series identifier for the matched macro indicator.
        data_tests:
          - not_null
      - name: macro_title
        description: Human-readable name of the matched macro indicator.
      - name: macro_signal_color
        description: Traffic-light signal for the relevant macro indicator (green/yellow/red).
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
        meta:
          dimension:
            type: string
            label: "Macro Signal"
      - name: regime_label
        description: Regime classification for the macro indicator (Elevated, Normal, Depressed, Insufficient data).
      - name: macro_value
        description: Latest observed value for the matched macro indicator.
      - name: as_of_period
        description: YYYY-MM period of the macro observation.
      - name: personalized_action
        description: Plain-English recommendation based on wealth tier + macro signal_color.
        data_tests:
          - not_null
      - name: financial_advice
        description: Pre-generated financial advice text from the user financial advice seed.
      - name: ai_insight
        description: Segment-level AI-generated insight from the segment intelligence seed.
      - name: _loaded_at
        description: Timestamp when this model was last built (UTC).
