version: 2

sources:
  - name: team_raw
    database: DB_TEAM_3
    schema: RAW
    tables:

      - name: WORLDBANK_METADATA
        description: >
          Metadata catalogue for all World Bank indicators ingested into DB_TEAM_3.RAW.WORLDBANK_INDICATORS.
          One row per series_id (indicator_code + "_" + country_iso3 format, e.g. NY.GDP.PCAP.PP.CD_USA).
          Source: World Bank Open Data API via wbgapi / worldbank Python library.
          Covers 10 socioeconomic indicators across 15 countries, annual frequency, years 2000–2024.
          Countries: AUS, BRA, CAN, CHN, DEU, FRA, GBR, IND, ITA, JPN, KOR, MEX, NGA, USA, ZAF.
          Indicators:
            NY.GDP.PCAP.PP.CD  — GDP per Capita PPP (current USD)
            PA.NUS.PPP         — PPP Conversion Factor (local currency per international dollar)
            BX.TRF.PWKR.CD.DT  — Personal Remittances Received (USD)
            FP.CPI.TOTL.ZG     — Inflation Rate (CPI, annual %)
            FR.INR.RINR        — Real Interest Rate (%)
            NY.GNS.ICTR.ZS     — Gross Savings (% of GDP)
            SI.DST.10TH.10     — Income Share of Top 10%
            SI.POV.GINI        — Gini Index (income inequality, 0=perfect equality, 100=maximum)
            SL.UEM.TOTL.ZS     — Unemployment Rate (%)
            SP.DYN.LE00.IN     — Life Expectancy at Birth (years)
        columns:
          - name: SERIES_ID
            description: >
              Compound identifier: "{WB_INDICATOR_CODE}_{ISO3_COUNTRY_CODE}" (e.g. NY.GDP.PCAP.PP.CD_USA).
              Primary key. Matches SERIES_ID in WORLDBANK_INDICATORS.
              Split on the last "_" to derive the indicator code and the 3-letter country ISO code.
          - name: TITLE
            description: Human-readable indicator and country name (e.g. "GDP per Capita PPP (current USD) - USA").
          - name: UNITS
            description: >
              Units of the value column in WORLDBANK_INDICATORS for this series
              (e.g. "current USD", "%", "years"). NULL when dimensionless (e.g. Gini Index, PPP factor).
          - name: FREQUENCY
            description: Data frequency. All World Bank indicators are Annual.
          - name: SOURCE
            description: Data provider. Always "World Bank".

      - name: WORLDBANK_INDICATORS
        description: >
          Annual socioeconomic time series for 15 countries sourced from the World Bank Open Data API.
          One row per (series_id, obs_date). Each series_id encodes both the indicator and country.
          Covers 150 series (10 indicators × 15 countries), each with 25 annual observations (2000–2024).
          Total: ~3,750 rows.
          Use WORLDBANK_METADATA to join indicator descriptions and country labels.
          obs_date is always January 1st of the reference year (e.g. 2024-01-01 = year 2024 data).
        columns:
          - name: SERIES_ID
            description: >
              Compound identifier: "{WB_INDICATOR_CODE}_{ISO3_COUNTRY_CODE}".
              Composite primary key with obs_date.
              Matches SERIES_ID in WORLDBANK_METADATA for joins.
          - name: OBS_DATE
            description: >
              Reference date. Always January 1st of the reference year (e.g. 2020-01-01 = year 2020).
              Use YEAR(obs_date) to extract the calendar year for time-series analysis.
              Composite primary key with series_id.
          - name: VALUE
            description: >
              Annual observed value (NUMBER(38,8)). Units vary by indicator — see WORLDBANK_METADATA.
              NULL indicates data not available for this country-year combination.
              Use NUMBER(38,8) precision — do not cast to FLOAT.
