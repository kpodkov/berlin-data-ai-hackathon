version: 2

sources:
  - name: team_raw
    database: DB_TEAM_3
    schema: RAW
    tables:

      - name: FRED_SERIES_METADATA
        identifier: FRED_METADATA
        description: >
          FRED series catalogue for the 31 macro series ingested into DB_TEAM_3.RAW.
          One row per series_id. Source: Federal Reserve Bank of St. Louis FRED API.
          Covers key macro indicators: GDP, CPI, unemployment, Fed funds rate,
          treasury yields, savings rate, debt service ratio, VIX, and S&P 500.
        columns:
          - name: SERIES_ID
            description: >
              FRED series identifier. Primary key.
              Known values for the financial advisor dashboard:
                GDPC1     — Real GDP (Quarterly)
                CPIAUCSL  — CPI All Urban Consumers (Monthly)
                UNRATE    — Unemployment Rate (Monthly)
                FEDFUNDS  — Federal Funds Rate (Monthly)
                DGS10     — 10-Year Treasury Yield (Daily)
                PSAVERT   — Personal Saving Rate (Monthly)
                TDSP      — Household Debt Service Ratio (Quarterly)
                VIXCLS    — CBOE VIX Volatility Index (Daily)
                SP500     — S&P 500 Index (Daily)
          - name: TITLE
            description: Human-readable series name (e.g. "Real Gross Domestic Product").
          - name: UNITS
            description: >
              Unit of measurement (e.g. "Billions of Chained 2017 Dollars",
              "Percent", "Index 1941-43=10").
          - name: FREQUENCY
            description: >
              Observation frequency: "Daily", "Weekly", "Monthly", "Quarterly", "Annual".
          - name: SEASONAL_ADJUSTMENT
            description: >
              Seasonal adjustment status: "Seasonally Adjusted", "Not Seasonally Adjusted",
              "Seasonally Adjusted Annual Rate".
          - name: LAST_UPDATED
            description: Timestamp of the most recent FRED update for this series.
          - name: CATEGORY
            description: >
              Human-readable category label assigned during ingestion
              (e.g. "Real GDP (quarterly)", "Unemployment Rate").

      - name: FRED_OBSERVATIONS
        description: >
          FRED time series observation data for 31 macro series.
          One row per (series_id, obs_date). ~48.5K rows.
          Source: Federal Reserve Bank of St. Louis FRED API.
          Missing FRED values (original "." string) are stored as NULL.
        columns:
          - name: SERIES_ID
            description: >
              FRED series identifier. Composite primary key with OBS_DATE.
              See FRED_SERIES_METADATA for series descriptions.
          - name: OBS_DATE
            description: >
              Observation date. Composite primary key with SERIES_ID.
              Frequency varies by series — daily, monthly, or quarterly.
          - name: VALUE
            description: >
              Observed numeric value in the series' native units (NUMBER(38,8)).
              NULL indicates a missing or suppressed FRED observation.
              Use NUMBER(38,8) precision — do not cast to FLOAT.
