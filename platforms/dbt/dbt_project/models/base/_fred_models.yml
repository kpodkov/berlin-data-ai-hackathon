version: 2

models:
  - name: base_fred_observations
    description: >
      Bronze layer for FRED time series observations.
      One row per (series_id, obs_date). Faithful copy of DB_TEAM_3.RAW.FRED_OBSERVATIONS
      with audit columns added (_source, _loaded_at). No value transformations applied.
      Covers 31 US macro series at mixed frequencies: daily, weekly, monthly, quarterly.
      Missing FRED values (raw code ".") are stored as NULL — filter with value IS NOT NULL downstream.
      Join to base_fred_series_metadata on series_id for human-readable titles and units.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        source: FRED (Federal Reserve Economic Data)
        layer: bronze
    columns:
      - name: series_id
        description: >
          FRED series identifier. Composite primary key with obs_date.
          Examples: GDPC1, UNRATE, CPIAUCSL, FEDFUNDS, DGS10, VIXCLS, SP500, PSAVERT, TDSP.
        data_tests:
          - not_null
      - name: obs_date
        description: >
          Observation date. Composite primary key with series_id.
          Daily series: one row per trading/calendar day.
          Monthly series: 1st of each month.
          Quarterly series: 1st of the quarter (Jan/Apr/Jul/Oct).
        data_tests:
          - not_null
      - name: value
        description: >
          Observation value. Units vary by series — see base_fred_series_metadata.
          NULL when FRED reports the value as missing.
      - name: _source
        description: Always 'fred'.
      - name: _loaded_at
        description: Timestamp when this dbt model was last run (UTC).

  - name: base_fred_series_metadata
    description: >
      Bronze layer for the FRED series catalogue.
      One row per series_id. Faithful copy of DB_TEAM_3.RAW.FRED_SERIES_METADATA
      with audit columns added and last_updated cast to TIMESTAMP_NTZ.
      Covers metadata for all 31 series present in base_fred_observations.
      Join to base_fred_observations on series_id to enrich time series data with titles and units.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        source: FRED (Federal Reserve Economic Data)
        layer: bronze
    columns:
      - name: series_id
        description: FRED series identifier. Primary key. Matches series_id in base_fred_observations.
        data_tests:
          - not_null
          - unique
      - name: title
        description: Human-readable series name (e.g. "Real Gross Domestic Product").
        data_tests:
          - not_null
      - name: units
        description: Units of measurement (e.g. "Billions of Chained 2017 Dollars", "Percent").
      - name: frequency
        description: "Observation frequency: Daily, Weekly, Monthly, Quarterly, Annual."
      - name: seasonal_adjustment
        description: Seasonal adjustment status from FRED.
      - name: last_updated_at
        description: Timestamp of the most recent data update on FRED (UTC), cast to TIMESTAMP_NTZ.
      - name: category
        description: >
          Category label assigned during ingestion
          (e.g. "Real GDP (quarterly)", "Unemployment Rate (monthly)").
      - name: _source
        description: Always 'fred'.
      - name: _loaded_at
        description: Timestamp when this dbt model was last run (UTC).
