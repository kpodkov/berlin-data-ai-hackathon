version: 2

# ──────────────────────────────────────────────────────────────────────────────
# BASE LAYER — StreamCap / JustWatch Content Licensing Intelligence
#
# Purpose: clean, deduplicated, bot-filtered views directly over the raw
# Snowflake source tables. No business logic lives here — only renaming,
# type casting, JSON extraction, and data-quality filters.
#
# All four event models (base_events_t1 through t4) are generated by the
# shared macro `macros/base_events.sql`. Changing the macro changes all four
# at once — the only difference between them is which source table they point
# to and therefore their row count, market coverage, and time window.
#
# Downstream models reference whichever event table matches their query scope:
#   T1 (9.2M rows, DE only, Dec 2025)   → prototype / fast iteration
#   T2 (40M rows, 8 EU markets)         → cross-market EU analysis
#   T3 (128M rows, 3-month window)      → seasonality / time-series
#   T4 (254M rows, 15 global markets)   → global reach analysis
# ──────────────────────────────────────────────────────────────────────────────

models:

  # ── base_events_t1 ──────────────────────────────────────────────────────────
  - name: base_events_t1
    description: |
      **Germany only | December 2025 | ~9.2 M rows | 1.3 GB**

      Cleaned view of the T1 Snowplow event stream. This is the primary
      prototyping table — all intermediate and mart models reference T1 by
      default, and are scaled to T2/T3/T4 only after query logic is validated.

      **Deduplication:** rows are deduplicated using `rid`, not `event_id`.
      The Snowplow pipeline uses at-least-once delivery, which can produce rare
      duplicate `event_id` values. `rid` is an internal sequence assigned
      after ingest and is guaranteed unique. Logic:
      `QUALIFY ROW_NUMBER() OVER (PARTITION BY rid ORDER BY collector_tstamp) = 1`

      **Bot filtering:** the `WHERE cc_yauaa:deviceClass NOT IN ('Robot','Spy','Hacker')`
      clause removes crawler traffic before any downstream count is computed.
      Without this filter, bot events inflate page-view and clickout counts by
      roughly 5 %.

      **JSON extraction:** the five `cc_*` context columns are VARIANT / OBJECT
      types in Snowflake. The macro extracts the most-used nested fields into
      typed scalar columns (e.g. `title_entity_id`, `app_locale`,
      `clickout_provider_id`) while keeping the raw VARIANT columns for
      ad-hoc downstream access.

      Generated by `macros/base_events.sql` — see that file for the full
      column list and transformation logic.
    columns:
      - name: rid
        description: |
          Internal row identifier assigned by the Snowplow pipeline post-ingest.
          **Always use `rid` for deduplication**, not `event_id`.
          `event_id` is a UUID generated client-side and can have rare duplicates
          due to at-least-once delivery semantics. `rid` is unique by design.
      - name: event_id
        description: |
          Client-generated UUID per event. May have rare duplicates — see `rid`.
          Retained for traceability and JOIN purposes with external systems.
      - name: session_id
        description: JustWatch session identifier. One session = continuous activity with fewer than 30 minutes of inactivity between events.
      - name: user_id
        description: |
          Anonymous device/browser ID assigned by JustWatch. Persistent across
          sessions on the same device. Never linked to personal account data.
          Used as the grain key in `int_user_activity` and `fct_user_segments`.
      - name: login_id
        description: |
          JustWatch login ID. Non-null only when the user is authenticated
          (~14 % of events). Useful for cross-device analysis. NULL-safe joins
          on this column should use `IS NOT DISTINCT FROM`.
      - name: session_idx
        description: Sequence number of this session for the given `user_id`. Value 1 = the user's first ever session on this device.
      - name: collector_tstamp
        description: |
          UTC timestamp when the Snowplow collector received the event.
          **Primary timestamp** for all time-based aggregations. Used for
          deduplication ordering in the `base_events` macro.
      - name: derived_tstamp
        description: |
          Client-side timestamp corrected for clock drift. More accurate than
          `collector_tstamp` for ordering events within a single session, but
          `collector_tstamp` is preferred for date-bucketing and group-by.
      - name: event
        description: |
          Snowplow event type. Two values exist in this dataset:
          `'struct'` (~95 % of rows) — structured events with `se_*` fields populated.
          `'page_view'` (~5 % of rows) — navigation events; `se_*` fields are all NULL.
          Downstream models use `event = 'page_view'` as a passive engagement signal
          for AVOD demand scoring.
      - name: app_id
        description: "Application identifier: `'jw-web'`, `'jw-android'`, `'jw-ios'`."
      - name: platform
        description: "Platform code: `'web'` (~90 %) or `'mob'` (~10 %)."
      - name: se_category
        description: |
          Structured event category. NULL for `page_view` events.
          Key values used in downstream demand models:
          `'clickout'` — monetisation intent (combined with `se_action` to determine AVOD/TVOD/SVOD).
          `'watchlist_add'` — high-intent engagement signal (weight 5 in AVOD score).
          `'userinteraction'` — general user interactions including `title_clicked`.
          `'youtube_started'` — trailer play (research behaviour).
          `'seenlist_add'`, `'likelist_add'` — preference signals.
          See `data/events_library.md` for the full taxonomy.
      - name: se_action
        description: |
          Action within the structured event category. NULL for `page_view` events.
          Critical values for the licensing model:
          `'free'`, `'ads'` → AVOD clickout intent (counted in `int_title_demand_signals.avod_clickouts`).
          `'rent'`, `'buy'`, `'cinema'` → TVOD clickout intent (`tvod_clickouts`).
          `'flatrate'`, `'sports'` → SVOD competitor clickout (`svod_clickouts`).
      - name: se_label
        description: Additional event label. Meaning depends on `se_category`. See `data/events_library.md`.
      - name: se_property
        description: Additional event property. Meaning depends on `se_category`. See `data/events_library.md`.
      - name: se_value
        description: Numeric value attached to the event. Usage varies by `se_category`.
      - name: geo_country
        description: |
          ISO 3166-1 alpha-2 country derived from IP geolocation (e.g. `'DE'`, `'FR'`).
          **This is the user's physical location, not their chosen market.**
          A German expat browsing from France has `geo_country = 'FR'`.

          ⚠️ **Do not use `geo_country` for market-level demand analysis.**
          Use `app_locale` instead. See `data/events_library.md` for details.
      - name: geo_region_name
        description: Region or state from IP geolocation (e.g. `'Bavaria'`). May be NULL.
      - name: geo_city
        description: City from IP geolocation. May be NULL.
      - name: title_entity_id
        description: |
          Extracted from `cc_title:jwEntityId::TEXT`. The JustWatch content ID for
          the title the user was viewing when this event fired.
          **Always points to the top-level title** (movie `tm*` or show `ts*`),
          even when the event fired on an episode or season page.
          Join key to `base_objects.object_id` and all title-level downstream models.
          NULL when the event is not content-related (e.g. homepage navigation).
      - name: title_object_type
        description: "Extracted from `cc_title:objectType::TEXT`. Content type as reported by the client: `'movie'`, `'show'`, `'season'`, `'episode'`. May differ from `base_objects.object_type` in edge cases."
      - name: title_season_number
        description: "Extracted from `cc_title:seasonNumber::INT`. Season number when the event fired on a season or episode page. NULL for movies and show-level pages."
      - name: title_episode_number
        description: "Extracted from `cc_title:episodeNumber::INT`. Episode number within the season. NULL for movies, shows, and season pages."
      - name: page_type
        description: "Extracted from `cc_page_type:pageType::TEXT`. The page the user was on (e.g. `'title_detail'`, `'home'`, `'genre'`)."
      - name: app_locale
        description: |
          Extracted from `cc_page_type:appLocale::TEXT`.
          **The market the user has selected in the JustWatch app** (e.g. `'de_DE'`, `'en_GB'`).
          This is the correct dimension for all market-level demand analysis.
          It differs from `geo_country` for users browsing a non-home-market locale
          (e.g. a German expat in France has `app_locale = 'de_DE'`, `geo_country = 'FR'`).
          Used as the market key in `int_title_market_demand` and `fct_market_demand_gap`.
      - name: clickout_provider_id
        description: |
          Extracted from `cc_clickout:providerId::NUMBER`. Non-null only on `se_category = 'clickout'` events.
          Join key to `base_packages.provider_id` to resolve provider names.
          Used in `int_title_provider_supply` to infer which providers offer each title.
      - name: clickout_monetization_type
        description: |
          Extracted from `cc_clickout:monetizationType::TEXT`. Non-null only on `se_category = 'clickout'` events.
          Mirrors `se_action` for clickout events. Values: `'free'`, `'ads'`, `'rent'`, `'buy'`, `'cinema'`, `'flatrate'`, `'sports'`.
      - name: device_class
        description: |
          Extracted from `cc_yauaa:deviceClass::TEXT`. Parsed device category from the YAUAA user-agent library.
          Values include `'Desktop'`, `'Phone'`, `'Tablet'`, `'Robot'`, `'Spy'`, `'Hacker'`.
          The bot filter in the macro removes rows where this is `'Robot'`, `'Spy'`, or `'Hacker'`
          before any other column is computed.
      - name: agent_name
        description: "Extracted from `cc_yauaa:agentName::TEXT`. Browser or client name (e.g. `'Chrome'`, `'Safari'`, `'JustWatch Android App'`)."
      - name: search_entry
        description: "Extracted from `cc_search:searchEntry::TEXT`. The search query string typed by the user. Non-null only on search-related events."
      - name: useragent
        description: Raw HTTP User-Agent string. Retained for ad-hoc debugging. Use `device_class` and `agent_name` for structured device analysis.
      - name: cc_title
        description: "Raw VARIANT column. Full title context JSON. Access nested fields with colon notation: `cc_title:jwEntityId::TEXT`. Retained alongside extracted columns for ad-hoc queries."
      - name: cc_page_type
        description: "Raw OBJECT column. Full page type context. Access with `cc_page_type:appLocale::TEXT`, `cc_page_type:pageType::TEXT`."
      - name: cc_clickout
        description: "Raw OBJECT column. Full clickout context. Access with `cc_clickout:providerId::NUMBER`, `cc_clickout:monetizationType::TEXT`. Present only on clickout events."
      - name: cc_yauaa
        description: "Raw OBJECT column. Full parsed user-agent (YAUAA). Access with `cc_yauaa:deviceClass::TEXT`."
      - name: cc_search
        description: "Raw OBJECT column. Full search context. Access with `cc_search:searchEntry::TEXT`. Present only on search events."

  # ── base_events_t2 / t3 / t4 ────────────────────────────────────────────────
  - name: base_events_t2
    description: |
      **8 EU markets | December 2025 | ~40 M rows | 5.7 GB**

      Identical schema to `base_events_t1`. Use after validating query logic on T1.
      Enables cross-market EU analysis in `int_title_market_demand` and
      `fct_market_demand_gap`. Swap the `ref('base_events_t1')` in intermediate
      models to `ref('base_events_t2')` to scale up.
      Recommended warehouse: `WH_TEAM_<N>_XS`.

  - name: base_events_t3
    description: |
      **8 EU markets | November 2025 – January 2026 (3 months) | ~128 M rows | 17.9 GB**

      Identical schema to `base_events_t1`. Covers three calendar months, making
      it the only table that contains enough history to detect holiday-period demand
      spikes (Christmas / New Year window). Used exclusively by
      `fct_title_seasonality` which aggregates weekly AVOD/TVOD trends and
      flags `is_holiday_window` for Dec 20 – Jan 6.
      Recommended warehouse: `WH_TEAM_<N>_S` or larger.

  - name: base_events_t4
    description: |
      **15 global markets | November – December 2025 | ~254 M rows | 36.1 GB**

      Identical schema to `base_events_t1`. Broadest geographic coverage — use for
      global cross-market arbitrage analysis. Switch intermediate models from T1 to T4
      to surface titles that have demand outside Europe.
      Recommended warehouse: `WH_TEAM_<N>_M` for complex joins.

  # ── base_objects ─────────────────────────────────────────────────────────────
  - name: base_objects
    description: |
      **JustWatch content metadata | ~2.3 M rows**

      One row per content object. Object types: `movie`, `show`, `season`, `episode`
      (and the rare uppercase variant `MOVIE` which is normalised to lowercase here).

      **Top-level title filter:** downstream models consistently apply
      `WHERE title_id = object_id` to restrict to movies and shows. This works
      because `title_id = object_id` is true only for top-level titles — for seasons
      and episodes, `title_id` points to the parent show, not the object itself.

      **Join key to events:** `base_objects.object_id = base_events_t1.title_entity_id`.
      The event field `cc_title:jwEntityId` always contains the top-level title ID
      even when the user is on an episode page, so this join never fans out.

      **Array columns** (`genre_tmdb`, `production_countries`, `talent_cast`, etc.)
      require `LATERAL FLATTEN` in downstream SQL. Example:
      `FROM base_objects o, LATERAL FLATTEN(input => o.genre_tmdb) AS g`
      Used this way in `fct_genre_demand_profile`.
    columns:
      - name: object_id
        description: "Primary key. JustWatch content ID. Prefix indicates type: `tm` = movie, `ts` = show, `tss` = season, `tse` = episode. Join key to events via `title_entity_id`."
      - name: object_type
        description: |
          Normalised to lowercase in this model (`lower(object_type)`). The raw source
          contains a rare uppercase variant `'MOVIE'`; normalisation ensures consistent
          filtering with `IN ('movie', 'show')` in downstream models.
          Values: `'movie'`, `'show'`, `'season'`, `'episode'`, `'show_episode'`.
      - name: title_id
        description: |
          Top-level title ID. Equals `object_id` for movies and shows.
          Points to the parent show's `object_id` for seasons and episodes.
          **Used as the top-level-only filter** in intermediate and mart models:
          `WHERE title_id = object_id` isolates movies and shows.
      - name: parent_id
        description: For episodes — `object_id` of their season. For seasons — `object_id` of the show. NULL for movies and shows.
      - name: show_season_id
        description: For episodes only — `object_id` of their season. NULL otherwise.
      - name: title
        description: Display title in English. Primary display field in dashboard outputs.
      - name: original_title
        description: Title in the original production language (e.g. `'Das Boot'`). Used in `fct_title_acquisition_priority` as a secondary identifier.
      - name: release_year
        description: |
          Year of first release. Used in two places:
          1. **Cost tier classification** in `fct_title_licensing_score`: titles released
             2024 or later with high IMDB votes are flagged `'premium'` cost tier.
          2. **XGBoost feature engineering** (`release_age_years = 2025 - release_year`).
      - name: imdb_score
        description: "IMDB user rating (0.0–10.0). May be NULL for many titles. Used as a quality signal in cost tier logic and in `fct_genre_demand_profile` for `avg_imdb_score` per genre."
      - name: imdb_votes
        description: |
          Number of IMDB user votes. Extracted from `scoring:score_imdb_votes::NUMBER`
          and surfaced here as a first-class column for ease of use.
          More complete than `imdb_score` as a popularity proxy — many titles have votes
          but no score. Used in the cost tier formula:
          `CASE WHEN release_year >= 2024 AND imdb_votes > 100000 THEN 'premium' ...`
      - name: genre_tmdb
        description: "ARRAY of genre strings from TMDB (e.g. `['Drama', 'Thriller']`). Requires `LATERAL FLATTEN` to unnest. Used in `fct_genre_demand_profile` to produce per-genre demand totals."
      - name: production_countries
        description: "ARRAY of ISO 3166-1 alpha-2 country codes for production countries. Requires `LATERAL FLATTEN` to unnest."
      - name: scoring
        description: "Raw OBJECT containing JustWatch scoring data. The key field `scoring:score_imdb_votes::NUMBER` is extracted and renamed to `imdb_votes` in this model."

  # ── base_packages ─────────────────────────────────────────────────────────────
  - name: base_packages
    description: |
      **Streaming provider lookup | 1,526 rows**

      One row per streaming provider / package. Used as a dimension table in
      `int_title_provider_supply` to resolve provider names from numeric IDs.

      **Join key to events:** `base_packages.provider_id = base_events_t1.clickout_provider_id`.
      The rename from `id` → `provider_id` enforces consistent naming throughout
      the downstream models.

      `monetization_types` is a comma-separated string (e.g. `'flatrate,rent,buy'`)
      because a single provider can offer multiple monetisation models. Downstream
      models classify clickout events by `clickout_monetization_type` (per-event)
      rather than by this column, which represents the provider's full offering.
    columns:
      - name: provider_id
        description: "Primary key. Renamed from `id` in the source. Join to events via `clickout_provider_id`."
      - name: technical_name
        description: "Internal slug (e.g. `'netflix'`, `'amazon_prime_video'`). Stable across markets — use this for grouping and filtering in code, not `clear_name`."
      - name: clear_name
        description: "Display name (e.g. `'Netflix'`, `'Amazon Prime Video'`). Used for chart axes and dashboard labels in `int_title_provider_supply.provider_clear_name`."
      - name: monetization_types
        description: "Comma-separated monetisation models this provider offers: `'flatrate'`, `'free'`, `'rent'`, `'buy'`, `'cinema'`. A provider may offer multiple (e.g. `'flatrate,rent,buy'`). Not used directly in downstream models — per-event monetisation type is taken from `clickout_monetization_type`."
