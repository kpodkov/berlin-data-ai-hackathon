version: 2

models:
  - name: int_macro_regime_indicators
    description: >
      Monthly-aligned FRED macro signals with z-scores and regime labels.
      Grain: one row per series_id (latest monthly snapshot only).
      All series normalized to monthly grain before z-score computation (judge fix applied):
      daily/weekly → last value in month; quarterly → sparse monthly rows retained as-is.
      Z-scores use a rolling 36-month window; null when < 12 months of data available.
      Signal colors are direction-aware: high VIX/unemployment = red; high GDP/savings = green.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: series_id
        description: FRED series identifier. Primary key.
        data_tests:
          - not_null
          - unique
      - name: month_date
        description: First day of the calendar month this snapshot represents.
        data_tests:
          - not_null
      - name: last_obs_date
        description: Actual date of the last raw observation used (meaningful for daily series).
      - name: value
        description: Latest monthly value. Units vary by series — see stg_fred_series_metadata.
      - name: value_12m_ago
        description: Value 12 monthly observations prior. Null if history is insufficient.
      - name: yoy_change_pct
        description: Year-over-year percentage change. Null if value_12m_ago is null or zero.
      - name: rolling_mean_36m
        description: Rolling 36-month mean of the monthly series.
      - name: rolling_stddev_36m
        description: Rolling 36-month standard deviation (sample).
      - name: rolling_count
        description: Number of non-null observations in the 36-month window.
      - name: z_score
        description: >
          (value − mean) / stddev over the trailing 36 months. Null when rolling_count < 12.
          Comparable across series because all are normalized to the same window.
        data_tests:
          - not_null:
              where: "rolling_count >= 12 and rolling_stddev_36m > 0"
      - name: regime_label
        description: Human-readable regime based on z-score thresholds.
        data_tests:
          - accepted_values:
              values: ['Elevated', 'Normal', 'Depressed', 'Insufficient data']
      - name: signal_color
        description: >
          Traffic-light color for the dashboard. Direction-aware:
          GDPC1/PSAVERT/SP500 = green when high, red when low.
          UNRATE/TDSP/VIXCLS/CPIAUCSL = red when high, green when low.
          DGS10/FEDFUNDS = always yellow (context-only).
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
      - name: as_of_period
        description: YYYY-MM label of the latest observation month.
        data_tests:
          - not_null
      - name: title
        description: Human-readable series name from stg_fred_series_metadata.
      - name: units
        description: Units of the value column for this series.
      - name: frequency
        description: Original FRED frequency (Daily, Monthly, Quarterly, etc.).

  - name: int_asset_returns
    description: >
      Monthly returns, rolling volatility, drawdowns, and Sharpe ratios per instrument.
      Grain: one row per (series_id, month_date). Resampled from daily prices to monthly
      (last closing price per month). Covers 13 instruments from stg_market_prices.
      Sharpe ratio uses annualized 12-month return / annualized 12-month vol (no risk-free rate).
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: series_id
        description: Yahoo Finance ticker. Composite primary key with month_date.
        data_tests:
          - not_null
      - name: month_date
        description: First day of the calendar month. Composite primary key with series_id.
        data_tests:
          - not_null
      - name: title
        description: Instrument name from stg_market_metadata.
      - name: asset_class
        description: >
          Derived asset class grouping: US Equity, US Equity (Growth), Energy, US Bonds,
          Long Treasury, TIPS, Real Estate, Gold, Intl Developed, Intl Emerging, Crypto, USD Index.
      - name: data_source
        description: Always 'Yahoo Finance'.
      - name: monthly_close
        description: Adjusted closing price on the last trading day of the month (USD).
      - name: monthly_return
        description: >
          (monthly_close / prior_month_close) - 1. Null for the first observation per series.
      - name: trailing_12m_return
        description: (monthly_close / close_12m_ago) - 1. Null for first 12 months per series.
      - name: trailing_12m_vol
        description: Annualized volatility = STDDEV(monthly_return over 12m) * SQRT(12).
      - name: sharpe_ratio
        description: trailing_12m_return / trailing_12m_vol. Null when months_in_window < 12.
      - name: drawdown_from_ath
        description: (monthly_close - all_time_high) / all_time_high. Always <= 0.
      - name: all_time_high
        description: Maximum monthly close price up to and including this month.
      - name: months_in_window
        description: Number of monthly return observations in the trailing 12-month window.
      - name: momentum_label
        description: >
          Trend label based on trailing_12m_return:
          Strong Uptrend (>10%), Uptrend (0–10%), Downtrend (-10%–0%), Strong Downtrend (<-10%).

  - name: int_fred_time_series
    description: >
      Full monthly history of 9 key FRED series with YoY changes for dashboard charting.
      Grain: one row per (series_id, month_date). Keeps complete history — not just latest.
      All series normalized to monthly grain (same logic as int_macro_regime_indicators).
      Intended for Lightdash line charts showing multi-year trends.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: series_id
        description: FRED series identifier. Composite primary key with month_date.
        data_tests:
          - not_null
      - name: month_date
        description: First day of the calendar month. Composite primary key with series_id.
        data_tests:
          - not_null
      - name: title
        description: Human-readable series name from stg_fred_series_metadata.
      - name: units
        description: Units of the value column for this series.
      - name: frequency
        description: Original FRED frequency (before monthly normalization).
      - name: category
        description: Category label from stg_fred_series_metadata (e.g. 'Real GDP (quarterly)').
      - name: value
        description: Monthly value (last observation in month for daily series).
      - name: value_12m_ago
        description: Value 12 monthly rows prior. Null for first year of history per series.
      - name: yoy_change_pct
        description: Year-over-year percentage change. Null when value_12m_ago is null or zero.

  - name: int_risk_dashboard
    description: >
      Four macro risk indicators in tall format. Grain: one row per risk_indicator (~4 rows).
      Each row has a traffic-light, numeric risk_value, and plain-English action_text.
      Indicators: Yield Curve Signal, Market Volatility (VIX), Inflation Momentum, Unemployment Trend.
      Note: "recession probability" was replaced with "yield curve signal" per design review —
      true probability requires a calibrated model not available in this dataset.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: risk_indicator
        description: Name of the risk indicator. Primary key.
        data_tests:
          - not_null
          - unique
          - accepted_values:
              values:
                - 'Yield Curve Signal'
                - 'Market Volatility (VIX)'
                - 'Inflation Momentum'
                - 'Unemployment Trend'
      - name: category
        description: Category grouping for the indicator.
        data_tests:
          - not_null
      - name: risk_value
        description: Numeric signal value (interpretation depends on indicator — see units).
      - name: units
        description: Units of risk_value (e.g. 'percentage points', 'index points').
      - name: traffic_light
        description: Traffic-light signal.
        data_tests:
          - not_null
          - accepted_values:
              values: ['green', 'yellow', 'red']
      - name: action_text
        description: Plain-English interpretation and recommended action for this indicator.
        data_tests:
          - not_null
      - name: urgency_rank
        description: Sort order — red=1, yellow=2, green=3. Use for dashboard ordering.
      - name: _loaded_at
        description: Timestamp when this model was last built (UTC).

  - name: int_fred_topic_classified
    description: >
      FRED observations joined with series metadata and classified by personal finance topic.
      Grain: one row per (series_id, obs_date). Provides the topic column used by downstream
      mart models to filter observations by domain (debt, cpi, housing, savings, rates, etc.).
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: series_id
        description: FRED series identifier. Composite primary key with obs_date.
        data_tests:
          - not_null
      - name: obs_date
        description: Observation date. Composite primary key with series_id.
        data_tests:
          - not_null
      - name: value
        description: Observed value in native units.
      - name: title
        description: Human-readable series name from stg_fred_series_metadata.
      - name: units
        description: Units of the value column.
      - name: frequency
        description: Original FRED frequency (Daily, Monthly, Quarterly, Annual).
      - name: topic
        description: >
          Personal finance domain classification: income, savings, debt, housing, cpi,
          rates, market, wealth, macro, or other.

  - name: int_market_daily_returns
    description: >
      Daily market prices enriched with metadata, asset class label, and daily return.
      Grain: one row per (series_id, obs_date). Joins stg_market_prices with stg_market_metadata
      and computes daily_return via LAG(). Used by mart_investment_performance.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: series_id
        description: Yahoo Finance ticker symbol. Composite primary key with obs_date.
        data_tests:
          - not_null
      - name: obs_date
        description: Trading date. Composite primary key with series_id.
        data_tests:
          - not_null
      - name: value
        description: Adjusted closing price (USD).
      - name: title
        description: Instrument name from stg_market_metadata.
      - name: asset_class
        description: "Asset class bucket: equity, bond, commodity, crypto, real_estate, currency, or other."
      - name: daily_return
        description: Day-over-day return as a decimal fraction. Null for the first observation per series.
      - name: month_key
        description: First day of the calendar month (date_trunc to month). Used for monthly aggregation.

  - name: int_worldbank_enriched
    description: >
      World Bank observations enriched with parsed indicator/country codes, human-readable labels,
      and title from metadata. Grain: one row per (indicator_code, country_code, obs_date).
      Joins stg_worldbank_indicators + stg_worldbank_metadata. Used by mart_global_comparison.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: indicator_code
        description: World Bank indicator code extracted from the compound series_id.
        data_tests:
          - not_null
      - name: country_code
        description: ISO3 country code extracted from the compound series_id.
        data_tests:
          - not_null
      - name: indicator_name
        description: Human-readable indicator name resolved from the indicator_code.
      - name: country_name
        description: Human-readable country name resolved from the ISO3 country_code.
      - name: obs_date
        description: Observation date (Jan 1 of the reference year for annual World Bank data).
        data_tests:
          - not_null
      - name: obs_year
        description: Reference year as an integer.
      - name: value
        description: Indicator value in native units. Null when data is unavailable for that country-year.
      - name: title
        description: Series title from stg_worldbank_metadata.

  - name: int_ecb_exchange_rates
    description: >
      Monthly ECB EUR/FX exchange rates enriched with metadata and YoY change.
      Grain: one row per (series_id, month_date). 30 EUR/FX pairs from the European Central Bank.
      Includes trend_direction signal (EUR Strengthening / Stable / EUR Weakening).
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: series_id
        description: ECB series identifier. Composite primary key with month_date.
        data_tests: [not_null]
      - name: month_date
        description: First day of the calendar month. Composite primary key with series_id.
        data_tests: [not_null]
      - name: title
        description: Human-readable pair name (e.g. "EUR/USD Exchange Rate (monthly avg)").
      - name: value
        description: EUR exchange rate value for the period.
      - name: yoy_change_pct
        description: Year-over-year percentage change in the exchange rate.
      - name: trend_direction
        description: EUR trend signal — EUR Strengthening, Stable, or EUR Weakening.

  - name: int_user_wealth_proxy
    description: >
      User wealth profile derived from JustWatch behavioral signals.
      Grain: one row per user_id. Maps financial_score → wealth_tier (Budget/Middle/Affluent/Premium),
      tvod_propensity → spending_willingness, and wealth_tier → macro_focus (which macro indicators
      are most relevant for this user). Joins with AI-generated financial_advice and segment ai_insight.
    config:
      meta:
        contains_pii: no
        owner: "@team-3"
        layer: intermediate
    columns:
      - name: user_id
        description: Anonymous JustWatch user identifier. Primary key.
        data_tests: [not_null, unique]
      - name: wealth_tier
        description: Derived tier from financial_score. Values — Premium, Affluent, Middle, Budget.
        data_tests:
          - accepted_values:
              values: ['Premium', 'Affluent', 'Middle', 'Budget']
      - name: spending_willingness
        description: Derived from tvod_propensity and is_free_only.
        data_tests:
          - accepted_values:
              values: ['Free Only', 'High Spender', 'Moderate Spender', 'Low Spender']
      - name: macro_focus
        description: Which macro indicators are most relevant for this wealth tier.
      - name: financial_advice
        description: AI-generated financial advice text (null if not generated for this user).
      - name: ai_insight
        description: Segment-level AI insight from stg_segment_intelligence.
