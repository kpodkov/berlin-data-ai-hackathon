chartConfig:
  config:
    columns:
      mart_risk_monitor_action_text:
        name: Interpretation & Action
      mart_risk_monitor_category:
        name: Category
      mart_risk_monitor_overall_risk_label:
        name: Overall Risk
      mart_risk_monitor_risk_indicator:
        frozen: true
        name: Risk Indicator
      mart_risk_monitor_traffic_light:
        name: Signal
    conditionalFormattings:
      - applyTo: cell
        color: "#10B981"
        rules:
          - id: green-risk
            operator: equals
            values:
              - green
        target:
          fieldId: mart_risk_monitor_traffic_light
      - applyTo: cell
        color: "#F59E0B"
        rules:
          - id: yellow-risk
            operator: equals
            values:
              - yellow
        target:
          fieldId: mart_risk_monitor_traffic_light
      - applyTo: cell
        color: "#EF4444"
        rules:
          - id: red-risk
            operator: equals
            values:
              - red
        target:
          fieldId: mart_risk_monitor_traffic_light
    hideRowNumbers: true
    showColumnCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: null
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - mart_risk_monitor_risk_indicator
    - mart_risk_monitor_category
    - mart_risk_monitor_traffic_light
    - mart_risk_monitor_action_text
    - mart_risk_monitor_overall_risk_label
  exploreName: mart_risk_monitor
  filters: {}
  limit: 10
  metricOverrides: {}
  metrics: []
  sorts:
    - descending: false
      fieldId: mart_risk_monitor_traffic_light
  tableCalculations: []
name: Risk Monitor — Indicator Detail
slug: fa-risk-table
spaceSlug: shared
tableConfig:
  columnOrder:
    - mart_risk_monitor_risk_indicator
    - mart_risk_monitor_category
    - mart_risk_monitor_traffic_light
    - mart_risk_monitor_action_text
    - mart_risk_monitor_overall_risk_label
tableName: mart_risk_monitor
version: 1
