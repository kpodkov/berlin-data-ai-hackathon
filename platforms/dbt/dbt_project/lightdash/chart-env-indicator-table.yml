      fct_market_environment_overall_environment:
        name: "Overall Environment"
    conditionalFormattings:
      - target:
          fieldId: "fct_market_environment_signal_color"
        color: "#10B981"
        rules:
          - id: "green-signal"
            operator: "equals"
            values: ["green"]
        applyTo: "cell"
      - target:
          fieldId: "fct_market_environment_signal_color"
        color: "#F59E0B"
