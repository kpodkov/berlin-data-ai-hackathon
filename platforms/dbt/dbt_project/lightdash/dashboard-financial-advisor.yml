version: 1
name: "Financial Advisor Dashboard"
slug: "financial-advisor-dashboard"
spaceSlug: "financial-advisor"
description: >
  Macro environment and risk monitor for financial advisors.
  Illustrative only — uses finalized historical data. Not investment advice.

tiles:
  # ── Section 1: Market Environment ─────────────────────────────────────────

  - type: heading
    x: 0
    y: 0
    w: 36
    h: 1
    properties:
      text: "📊 Section 1 — Market Environment: Where are we in the economic cycle?"

  # Row 1: Signal count KPIs
  - type: saved_chart
    x: 0
    y: 1
    w: 12
    h: 4
    properties:
      chartSlug: "fa-env-green-count"
      title: "Green Signals"

  - type: saved_chart
    x: 12
    y: 1
    w: 12
    h: 4
    properties:
      chartSlug: "fa-env-yellow-count"
      title: "Yellow Signals"

  - type: saved_chart
    x: 24
    y: 1
    w: 12
    h: 4
    properties:
      chartSlug: "fa-env-red-count"
      title: "Red Signals"

  # Row 2: Indicator breakdown table
  - type: saved_chart
    x: 0
    y: 5
    w: 36
    h: 10
    properties:
      chartSlug: "fa-env-indicator-table"
      title: "Macro Indicator Breakdown"

  # ── Section 4: Risk Monitor ────────────────────────────────────────────────

  - type: heading
    x: 0
    y: 15
    w: 36
    h: 1
    properties:
      text: "🚨 Section 4 — Risk Monitor: Should I be worried right now?"

  # Row 3: Risk score KPI
  - type: saved_chart
    x: 0
    y: 16
    w: 12
    h: 4
    properties:
      chartSlug: "fa-risk-score"
      title: "Overall Risk Score"

  - type: markdown
    x: 12
    y: 16
    w: 24
    h: 4
    properties:
      title: "Risk Score Legend"
      content: |
        | Score | Label | Signal |
        |-------|-------|--------|
        | < 30 | Low Risk | 🟢 |
        | 30–59 | Moderate Risk | 🟡 |
        | ≥ 60 | High Risk | 🔴 |

        Score = AVG(red=100, yellow=50, green=0) across all risk indicators.

  # Row 4: Risk indicator detail table
  - type: saved_chart
    x: 0
    y: 20
    w: 36
    h: 10
    properties:
      chartSlug: "fa-risk-table"
      title: "Risk Indicator Detail"

  # ── Disclaimer ────────────────────────────────────────────────────────────

  - type: markdown
    x: 0
    y: 30
    w: 36
    h: 2
    properties:
      title: ""
      content: |
        ⚠️ **Disclaimer:** Illustrative only — uses finalized historical data. Not investment advice.

tabs: []

config:
  isDateZoomDisabled: true
  isAddFilterDisabled: false
